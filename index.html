<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InReach Healthcare - Coming Soon</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #111827;
      }
      .wrap {
        width: min(720px, 92vw);
        text-align: center;
        padding: 32px 18px;
      }
      img {
        width: min(260px, 60vw);
        height: auto;
        display: block;
        margin: 0 auto 18px;
      }
      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      p {
        margin: 10px 0 0;
        font-size: clamp(14px, 1.9vw, 18px);
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <img src="logo.jpg" alt="InReach Healthcare logo" />
      <h1>InReach Healthcare Coming Soon</h1>
      <p>We’re working on something new. Check back soon.</p>
    </main>
  </body>
</html>
